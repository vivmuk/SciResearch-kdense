# LiteLLM proxy config — retained only for the cost-tracking callback.
# All model calls now go directly to the Venice API; this proxy is no longer
# in the request path. You can stop running it if you don't need cost logging
# from the expert subprocess.

model_list: []

general_settings:
  master_key: sk-litellm-local

litellm_settings:
  callbacks: ["litellm_callbacks.proxy_handler_instance"]
